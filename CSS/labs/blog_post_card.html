<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="blog_post_card.css">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
</head>

<body>

    <div class="blog-post-card">
        <img 
            alt="Manos en una computadora" 
            class="post-img" 
            src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
            >
        <div class="post-content">
            <h2 class="post-title">Learn Web Development in 2026.</h2>
            <p class="post-excerpt">Stay ahead of the curve with the latest trends in web development. Discover what's new and exciting in 2026.</p>
            <a class="read-more">Read More</a>
        </div>
    </div>
    
</body>

</html>
