<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="cards-page.css">
</head>

<body>
    <main id="playing-cards">
    
    <div class="card uno-picas">
        <div class="top-left">
            <div>A</div>
            <div>♠</div>            
        </div>
        <div class="middle">
            <div>♠</div>            
        </div>
        <div class="bottom-right">
            <div>A</div>
            <div>♠</div>            
        </div>
    </div>
    
    <div class="card dos-trebol">
        <div class="top-left">
            <div>2</div>
            <div>♣</div>
        </div>
        <div class="middle">
            <div class="column">
                <div>♣</div>
                <div>♣</div>
            </div>
        </div>
        <div class="bottom-right">
            <div>2</div>
            <div>♣</div>
        </div>
    </div>
    
    <div class="card red 3-corazon">
        <div class="top-left">
            <div>3</div>
            <div>♥</div>
        </div>
        <div class="middle">
            <div class="column">
                <div>♥</div>
                <div>♥</div>
                <div>♥</div>
            </div>
            
        </div>
        <div class="bottom-right">
            <div>3</div>
            <div>♥</div>
        </div>
    </div>
    
    <div class="card cuatro-trebol">
        <div class="top-left">
            <div>4</div>
            <div>♣</div>
        </div>
        <div class="middle">
            <div class="column">
                <div>♣</div>
                <div>♣</div>
            </div>
            <div class="column">
                <div>♣</div>
                <div>♣</div>
            </div>
        </div>
        <div class="bottom-right">
            <div>4</div>
            <div>♣</div>
        </div>
    </div>

    <div class="card red cinco-diamante">
        <div class="top-left">
            <div>5</div>
            <div>♦</div>
        </div>
        <div class="middle">
            <div class="column">
                <div>♦</div>
                <div>♦</div>
            </div>
            <div class="column center-col">
                <div>♦</div>
            </div>
            <div class="column">
                <div>♦</div>
                <div>♦</div>
            </div>
        </div>
        <div class="bottom-right">
            <div>5</div>
            <div>♦</div>
        </div>
</main>
</body>

</html>
